<!doctype html>
<html><head>
  <meta charset="utf-8">
  <title>Up-take — Settings</title>
  <link rel="stylesheet" href="options.css">
</head><body>
  <h1>Up-take Extension</h1>

  <section>
    <p>
      All settings are managed from the <strong>toolbar popup</strong>.
      Click the Up-take icon in Chrome's toolbar to open it.
    </p>
    <p style="margin-top:8px;color:#888;font-size:.85rem">
      If the icon is hidden, click the puzzle-piece icon → pin <em>Up-take</em>.
    </p>
  </section>

  <section>
    <h2>Diagnostics</h2>
    <p>Extension settings stored in <code>chrome.storage.local</code>:</p>
    <pre id="dump">Loading…</pre>
  </section>

  <script>
    chrome.storage.local.get(null, (data) => {
      const safe = JSON.parse(JSON.stringify(data));
      if (safe.apiToken) safe.apiToken = "***";
      document.getElementById("dump").textContent = JSON.stringify(safe, null, 2);
    });
    chrome.storage.onChanged.addListener((changes, area) => {
      if (area !== "local") return;
      chrome.storage.local.get(null, (data) => {
        const safe = JSON.parse(JSON.stringify(data));
        if (safe.apiToken) safe.apiToken = "***";
        document.getElementById("dump").textContent = JSON.stringify(safe, null, 2);
      });
    });
  </script>
</body></html>
