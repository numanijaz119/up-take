<!doctype html>
<html><head>
  <meta charset="utf-8">
  <title>Up-take Extension Settings</title>
  <link rel="stylesheet" href="options.css">
</head><body>
  <h1>Up-take Extension</h1>

  <section>
    <h2>Backend</h2>
    <label>Backend URL <input id="backendUrl" type="url" placeholder="http://localhost:8000"></label>
    <label>API Token <input id="apiToken" type="password" placeholder="paste EXTENSION_API_TOKEN"></label>
    <button id="save">Save</button>
    <button id="test">Test Connection</button>
    <p id="status"></p>
  </section>

  <section>
    <h2>Current Config (read-only — change in backend)</h2>
    <pre id="configDump">Loading…</pre>
  </section>

  <section>
    <h2>Status</h2>
    <p>Managed tab: <span id="managedTab">none</span></p>
    <p>Last reload: <span id="lastReload">never</span></p>
  </section>

  <script src="options.js"></script>
</body></html>
