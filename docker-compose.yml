version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: uptake_postgres
    environment:
      POSTGRES_USER: uptake
      POSTGRES_PASSWORD: uptake_secret
      POSTGRES_DB: uptake
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptake"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uptake_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: uptake_app
    environment:
      DATABASE_URL: postgresql+asyncpg://uptake:uptake_secret@postgres:5432/uptake
      REDIS_URL: redis://redis:6379
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
