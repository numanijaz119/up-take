{% extends "base.html" %}
{% block title %}Dashboard — Up-take{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-6">

  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-white">Dashboard</h1>
      <p class="text-sm text-gray-400 mt-1">Real-time pipeline overview</p>
    </div>
    <div class="flex gap-2">
      <span id="health-indicator" class="inline-flex items-center gap-1.5 text-xs text-green-400">
        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Live
      </span>
    </div>
  </div>

  <!-- Stat Cards -->
  <div id="stats-panel"
       hx-get="/api/v1/jobs/stats"
       hx-trigger="load, refresh"
       hx-target="#stats-panel"
       hx-swap="outerHTML"
       class="grid grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- filled by HTMX -->
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800 animate-pulse h-24"></div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800 animate-pulse h-24"></div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800 animate-pulse h-24"></div>
    <div class="bg-gray-900 rounded-xl p-4 border border-gray-800 animate-pulse h-24"></div>
  </div>

  <!-- Pipeline Funnel + Draft Proposals side by side -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- Funnel -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
      <h2 class="text-sm font-semibold text-gray-300 mb-4">Pipeline Funnel (30d)</h2>
      <div hx-get="/api/v1/analytics/pipeline?days=30"
           hx-trigger="load"
           hx-target="this"
           hx-swap="innerHTML">
        <div class="space-y-2 animate-pulse">
          <div class="h-4 bg-gray-800 rounded w-full"></div>
          <div class="h-4 bg-gray-800 rounded w-5/6"></div>
          <div class="h-4 bg-gray-800 rounded w-4/6"></div>
          <div class="h-4 bg-gray-800 rounded w-3/6"></div>
        </div>
      </div>
    </div>

    <!-- Draft proposals queue -->
    <div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-gray-300">Pending Approval</h2>
        <a href="/proposals?status=draft" class="text-xs text-indigo-400 hover:text-indigo-300">View all →</a>
      </div>
      <div hx-get="/api/v1/proposals/?status=draft&per_page=5"
           hx-trigger="load"
           hx-target="this"
           hx-swap="innerHTML">
        <div class="space-y-2 animate-pulse">
          <div class="h-10 bg-gray-800 rounded"></div>
          <div class="h-10 bg-gray-800 rounded"></div>
          <div class="h-10 bg-gray-800 rounded"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Recent jobs -->
  <div class="bg-gray-900 rounded-xl border border-gray-800 p-5">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-sm font-semibold text-gray-300">Recently Detected Jobs</h2>
      <a href="/jobs" class="text-xs text-indigo-400 hover:text-indigo-300">View all →</a>
    </div>
    <div hx-get="/api/v1/jobs/?per_page=8"
         hx-trigger="load"
         hx-target="this"
         hx-swap="innerHTML">
      <div class="space-y-2 animate-pulse">
        <div class="h-8 bg-gray-800 rounded"></div>
        <div class="h-8 bg-gray-800 rounded"></div>
        <div class="h-8 bg-gray-800 rounded"></div>
      </div>
    </div>
  </div>

</div>

<script>
  // HTMX response handlers for stats panel
  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.target.id === 'stats-panel') return; // already JSON-free
  });

  // Override stats panel to render nicely
  document.addEventListener('DOMContentLoaded', function() {
    fetch('/api/v1/jobs/stats').then(r => r.json()).then(data => {
      const s = data.by_status || {};
      const total = data.total || 0;
      document.getElementById('stats-panel').outerHTML = `
        <div id="stats-panel" class="grid grid-cols-2 lg:grid-cols-4 gap-4">
          ${statCard('Total Detected', total, 'text-blue-400')}
          ${statCard('Proposed', (s.proposed||0)+(s.submitted||0), 'text-green-400')}
          ${statCard('Filtered Out', s.filtered_out||0, 'text-gray-500')}
          ${statCard('Submitted', s.submitted||0, 'text-indigo-400')}
        </div>`;
    });

    fetch('/api/v1/analytics/pipeline?days=30').then(r => r.json()).then(data => {
      const f = data.funnel || {};
      const r = data.rates || {};
      const el = document.querySelector('[hx-get="/api/v1/analytics/pipeline?days=30"]');
      if (!el) return;
      el.innerHTML = funnelHtml(f, r);
    });

    fetch('/api/v1/proposals/?status=draft&per_page=5').then(r => r.json()).then(data => {
      const el = document.querySelector('[hx-get="/api/v1/proposals/?status=draft&per_page=5"]');
      if (!el) return;
      if (!data.proposals?.length) {
        el.innerHTML = '<p class="text-sm text-gray-500">No pending proposals.</p>';
        return;
      }
      el.innerHTML = data.proposals.map(p => `
        <div class="flex items-center justify-between py-2 border-b border-gray-800 last:border-0">
          <div class="min-w-0 flex-1">
            <p class="text-sm text-gray-200 truncate">${p.job_title || 'Untitled'}</p>
            <p class="text-xs text-gray-500">Quality: ${p.quality_score?.toFixed(1) || '?'}/10 · ${p.word_count || 0}w</p>
          </div>
          <div class="flex gap-1 ml-3">
            <button onclick="approveProposal('${p.id}')"
              class="text-xs bg-green-700 hover:bg-green-600 px-2 py-1 rounded text-white transition">Approve</button>
            <button onclick="skipProposal('${p.id}')"
              class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-gray-300 transition">Skip</button>
          </div>
        </div>`).join('');
    });

    fetch('/api/v1/jobs/?per_page=8').then(r => r.json()).then(data => {
      const el = document.querySelector('[hx-get="/api/v1/jobs/?per_page=8"]');
      if (!el) return;
      if (!data.jobs?.length) {
        el.innerHTML = '<p class="text-sm text-gray-500">No jobs detected yet. Enable a channel to start.</p>';
        return;
      }
      el.innerHTML = `<div class="overflow-x-auto"><table class="w-full text-sm">
        <thead><tr class="text-left text-xs text-gray-500 border-b border-gray-800">
          <th class="pb-2 font-medium">Title</th>
          <th class="pb-2 font-medium">Score</th>
          <th class="pb-2 font-medium">Status</th>
          <th class="pb-2 font-medium">Source</th>
          <th class="pb-2 font-medium">Detected</th>
        </tr></thead>
        <tbody>${data.jobs.map(j => `<tr class="border-b border-gray-800/50 hover:bg-gray-800/30">
          <td class="py-2 pr-4 max-w-xs truncate text-gray-200">${j.title || '—'}</td>
          <td class="py-2 pr-4">${scoreBadge(j.opportunity_score)}</td>
          <td class="py-2 pr-4">${statusBadge(j.status)}</td>
          <td class="py-2 pr-4 text-gray-500 text-xs">${j.detected_via || '—'}</td>
          <td class="py-2 text-gray-500 text-xs">${timeAgo(j.detected_at)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
    });
  });

  function statCard(label, val, color) {
    return `<div class="bg-gray-900 rounded-xl p-4 border border-gray-800">
      <p class="text-xs text-gray-500 uppercase tracking-wide">${label}</p>
      <p class="text-3xl font-bold mt-1 ${color}">${val}</p>
    </div>`;
  }

  function funnelHtml(f, r) {
    const steps = [
      {label: 'Detected', val: f.detected, pct: 100},
      {label: 'Passed Filter', val: f.passed_filter, pct: r.filter_pass_rate},
      {label: 'Proposed', val: f.proposed, pct: r.proposal_rate},
      {label: 'Submitted', val: f.submitted, pct: r.submission_rate},
      {label: 'Hired', val: f.hired, pct: r.hire_rate},
    ];
    return steps.map(s => `
      <div class="mb-3">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span>${s.label}</span><span class="font-medium text-white">${s.val ?? 0}</span>
        </div>
        <div class="w-full bg-gray-800 rounded-full h-2">
          <div class="bg-indigo-500 h-2 rounded-full transition-all" style="width:${Math.min(100,s.pct||0)}%"></div>
        </div>
      </div>`).join('');
  }

  function scoreBadge(score) {
    if (score == null) return '<span class="text-gray-600 text-xs">—</span>';
    const color = score >= 80 ? 'bg-green-900 text-green-300' : score >= 60 ? 'bg-yellow-900 text-yellow-300' : 'bg-gray-800 text-gray-400';
    return `<span class="text-xs px-1.5 py-0.5 rounded ${color}">${score}</span>`;
  }

  function statusBadge(status) {
    const map = {
      new: 'bg-blue-900 text-blue-300',
      analyzing: 'bg-purple-900 text-purple-300',
      proposed: 'bg-indigo-900 text-indigo-300',
      submitted: 'bg-green-900 text-green-300',
      filtered_out: 'bg-gray-800 text-gray-500',
      skipped: 'bg-gray-800 text-gray-500',
    };
    return `<span class="text-xs px-1.5 py-0.5 rounded ${map[status] || 'bg-gray-800 text-gray-400'}">${status}</span>`;
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    if (isNaN(d.getTime())) return '—';
    const diff = Date.now() - d.getTime();
    if (diff < 0) return 'just now';
    const totalS = Math.floor(diff / 1000);
    if (totalS < 60) return `${totalS}s ago`;
    const totalM = Math.floor(totalS / 60);
    if (totalM < 60) return `${totalM}m ago`;
    const totalH = Math.floor(totalM / 60);
    const remM   = totalM % 60;
    if (totalH < 24) return remM > 0 ? `${totalH}h ${remM}m ago` : `${totalH}h ago`;
    const totalD = Math.floor(totalH / 24);
    const remH   = totalH % 24;
    return remH > 0 ? `${totalD}d ${remH}h ago` : `${totalD}d ago`;
  }

  async function approveProposal(id) {
    const r = await fetch(`/api/v1/proposals/${id}/approve`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({})});
    const data = await r.json();
    if (data.proposal_text) {
      copyToClipboard(data.proposal_text);
      if (data.job_url) window.open(data.job_url, '_blank');
      showToast('Approved! Proposal copied. Opening job...');
      setTimeout(() => location.reload(), 1500);
    }
  }

  async function skipProposal(id) {
    await fetch(`/api/v1/proposals/${id}/skip`, {method:'POST'});
    showToast('Skipped');
    setTimeout(() => location.reload(), 800);
  }
</script>
{% endblock %}
