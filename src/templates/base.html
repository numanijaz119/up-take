<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Up-take{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3/dist/htmx.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [x-cloak] { display: none; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <!-- Sidebar -->
  <div class="flex h-screen overflow-hidden">
    <nav class="w-56 bg-gray-900 border-r border-gray-800 flex flex-col shrink-0">
      <div class="px-5 py-4 border-b border-gray-800">
        <span class="text-lg font-bold text-indigo-400">Up-take</span>
        <span class="text-xs text-gray-500 block">Proposal Automation</span>
      </div>
      <ul class="flex-1 py-4 space-y-1 px-2">
        <li>
          <a href="/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition
            {% if request.url.path == '/' %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Dashboard
          </a>
        </li>
        <li>
          <a href="/jobs" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition
            {% if request.url.path == '/jobs' %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            Jobs
          </a>
        </li>
        <li>
          <a href="/proposals" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition
            {% if request.url.path == '/proposals' %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Proposals
          </a>
        </li>
        <li>
          <a href="/channels" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition
            {% if request.url.path == '/channels' %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            Channels
          </a>
        </li>
        <li>
          <a href="/settings" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm hover:bg-gray-800 transition
            {% if request.url.path == '/settings' %}bg-gray-800 text-indigo-400{% else %}text-gray-300{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Settings
          </a>
        </li>
      </ul>
      <div class="px-4 py-3 border-t border-gray-800 text-xs text-gray-600">
        v1.0.0 · Up-take
      </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-6">
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    // Auto-refresh stats every 30s on dashboard
    document.addEventListener('DOMContentLoaded', () => {
      if (window.location.pathname === '/') {
        setInterval(() => {
          htmx.trigger('#stats-panel', 'refresh');
        }, 30000);
      }
    });

    // Copy text to clipboard utility
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        showToast('Copied to clipboard!');
      });
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'fixed bottom-6 right-6 bg-indigo-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm z-50 transition-opacity';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2500);
    }
  </script>
</body>
</html>
